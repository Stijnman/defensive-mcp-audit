name: Feature request
description: Suggest a new defensive check or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        All features must stay within the **defensive-only** scope (read-only inspection, no exploitation).
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What risk or gap does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope confirmation
      options:
        - label: This is read-only / defensive inspection only
          required: true
        - label: I am willing to contribute a PR
          required: false