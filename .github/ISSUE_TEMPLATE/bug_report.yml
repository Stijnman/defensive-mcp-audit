name: Bug report
description: Report incorrect findings, crashes, or broken behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve defensive-mcp-audit. Please redact sensitive hostnames, tokens, and file paths.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.3.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. pip install -e ".[cli]"
        2. python -m defensive_mcp_audit --format json
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / JSON output
      render: shell