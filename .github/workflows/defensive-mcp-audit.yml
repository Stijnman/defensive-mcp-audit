name: Defensive MCP Audit

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 9 * * 1'   # Weekly on Monday at 09:00 UTC
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # Required to upload SARIF

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "typer[all]" rich

      - name: Run Defensive MCP Audit (SARIF)
        run: |
          python defensive_mcp_audit.py --format sarif -o results.sarif

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: defensive-mcp-audit

      - name: Generate HTML Report (artifact)
        run: |
          python defensive_mcp_audit.py --format html -o audit-report.html

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: defensive-mcp-audit-report
          path: audit-report.html
          retention-days: 30