name: Defensive MCP Audit

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  audit:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[cli]"

      - name: Run Defensive MCP Audit (SARIF)
        run: |
          python -m defensive_mcp_audit --format sarif -o results.sarif

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: defensive-mcp-audit

      - name: Generate HTML Report (artifact)
        run: |
          python -m defensive_mcp_audit --format html -o audit-report.html

      - name: Upload HTML Report
        uses: actions/upload-artifact@v7
        with:
          name: defensive-mcp-audit-report
          path: audit-report.html
          retention-days: 30